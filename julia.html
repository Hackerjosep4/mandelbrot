<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julia Set Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #00ffcc; --accent2: #ff3366; --text: #c8c8d8; --dim: #444466;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  header h1 { font-family: 'Orbitron', monospace; font-size: 1rem; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; }
  #coords { font-size: 0.72rem; color: var(--dim); letter-spacing: 1px; }
  #coords span { color: var(--accent); }
  .main { flex: 1; display: flex; overflow: hidden; }
  #canvas-container { flex: 1; position: relative; overflow: hidden; cursor: crosshair; background: #000; }
  canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; }
  #loading-overlay { position: absolute; bottom: 12px; right: 12px; display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: var(--accent); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  #loading-overlay.active { opacity: 1; }
  .spinner { width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #zoom-bar { position: absolute; bottom: 12px; left: 12px; font-size: 0.7rem; color: var(--dim); }
  #zoom-bar span { color: var(--accent2); }
  .sidebar { width: 220px; flex-shrink: 0; border-left: 1px solid var(--border); background: var(--surface); padding: 16px; display: flex; flex-direction: column; gap: 16px; font-size: 0.72rem; overflow-y: auto; }
  .sidebar h2 { font-family: 'Orbitron', monospace; font-size: 0.65rem; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat label { color: var(--dim); font-size: 0.65rem; }
  .stat value { color: var(--accent); word-break: break-all; }
  button { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; padding: 8px 12px; cursor: pointer; letter-spacing: 2px; transition: background 0.2s, color 0.2s; text-transform: uppercase; width: 100%; }
  button:hover { background: var(--accent); color: var(--bg); }
  .hint { font-size: 0.65rem; color: var(--dim); line-height: 1.6; }
  .hint b { color: var(--text); }
  #julia-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; min-height: 0; }
  #julia-list::-webkit-scrollbar { width: 4px; }
  #julia-list::-webkit-scrollbar-track { background: var(--bg); }
  #julia-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .julia-item { background: var(--bg); border: 1px solid var(--border); padding: 6px 10px; cursor: pointer; font-size: 0.68rem; color: var(--dim); transition: border-color 0.2s, color 0.2s; display: flex; justify-content: space-between; flex-shrink: 0; }
  .julia-item:hover { border-color: var(--accent); color: var(--accent); }
  .julia-item.active { border-color: var(--accent2); color: var(--accent2); }
  .julia-item .coords { color: inherit; }
  #no-julias { font-size: 0.65rem; color: var(--dim); font-style: italic; }
  .param-input { display: flex; gap: 6px; align-items: center; }
  .param-input input { background: var(--bg); border: 1px solid var(--border); color: var(--accent); font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; padding: 5px 8px; width: 100%; text-align: center; }
  .param-input input:focus { outline: none; border-color: var(--accent); }
  .param-input label { color: var(--dim); font-size: 0.65rem; min-width: 14px; }
</style>
</head>
<body>
<header>
  <h1>Julia Explorer</h1>
  <div id="coords">c = <span id="hcx">—</span> + <span id="hcy">—</span>i</div>
</header>
<div class="main">
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
    <div id="loading-overlay"><div class="spinner"></div> RENDERING…</div>
    <div id="zoom-bar">zoom: <span id="zoom-val">1×</span></div>
  </div>
  <div class="sidebar">
    <h2>Parameter c</h2>
    <div class="param-input">
      <label>x</label>
      <input type="text" id="input-cx" value="0" />
    </div>
    <div class="param-input">
      <label>y</label>
      <input type="text" id="input-cy" value="0" />
    </div>
    <button onclick="generateJulia()">▶ Generate</button>
    <button onclick="resetView()">↺ Reset View</button>
    <button onclick="location.href='./'">← Mandelbrot</button>

    <h2>Existing Sets</h2>
    <div id="julia-list"><span id="no-julias">loading…</span></div>
  </div>
</div>
<script>
  const API     = 'https://mb.hackerblock.win/mbapi';
  const DST_MAX = 4.0;
  const GRID    = 4; // 4x4 = 16 sectors
  const TOTAL_S = GRID * GRID;

  // Compute sector bounds dynamically: row-major, top-left to bottom-right
  const SECTOR_BOUNDS = [];
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const step = 4 / GRID;
      SECTOR_BOUNDS.push({
        x_min: -2 + c * step,
        x_max: -2 + (c + 1) * step,
        y_max: 2 - r * step,
        y_min: 2 - (r + 1) * step,
      });
    }
  }

  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  let view = { cx: 0, cy: 0, dst: 4 };
  let sectors = new Array(TOTAL_S).fill(null);
  let currentC = null;
  let loadingCount = 0;

  function resizeCanvas() {
    const cont = document.getElementById('canvas-container');
    canvas.width  = cont.clientWidth;
    canvas.height = cont.clientHeight;
    render();
  }

  function hasSectors() {
    return sectors.some(s => s !== null);
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!hasSectors()) {
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#1e1e3a';
      ctx.font = '14px "Share Tech Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Set c parameter and click Generate', canvas.width / 2, canvas.height / 2);
      updateStats();
      return;
    }

    const scale = Math.min(canvas.width, canvas.height) / view.dst;
    const pcx   = canvas.width / 2;
    const pcy   = canvas.height / 2;
    const sSize = (4 / GRID) * scale; // each sector covers 4/GRID math units

    for (let s = 0; s < TOTAL_S; s++) {
      const b = SECTOR_BOUNDS[s];
      const sx = pcx + (b.x_min - view.cx) * scale;
      const sy = pcy - (b.y_max - view.cy) * scale;

      if (sectors[s]) {
        ctx.drawImage(sectors[s], sx, sy, sSize, sSize);
      } else {
        ctx.fillStyle = '#0d0d1a';
        ctx.fillRect(sx, sy, sSize, sSize);
        ctx.strokeStyle = '#1e1e3a';
        ctx.lineWidth = 1;
        ctx.strokeRect(sx, sy, sSize, sSize);
      }
    }
    updateStats();
  }

  function updateStats() {
    document.getElementById('zoom-val').textContent = (4 / view.dst).toFixed(2) + '×';
  }

  function showLoading(show) {
    document.getElementById('loading-overlay').classList.toggle('active', show);
  }

  async function generateJulia() {
    const cx = parseFloat(document.getElementById('input-cx').value);
    const cy = parseFloat(document.getElementById('input-cy').value);
    if (isNaN(cx) || isNaN(cy)) return;

    currentC = { x: cx, y: cy };
    document.getElementById('hcx').textContent = cx;
    document.getElementById('hcy').textContent = cy;
    view = { cx: 0, cy: 0, dst: 4 };
    sectors = new Array(TOTAL_S).fill(null);
    render();

    loadingCount = TOTAL_S;
    showLoading(true);

    const t = Date.now();
    for (let s = 0; s < TOTAL_S; s++) {
      fetch(`${API}/julia/${cx}/${cy}/${s}`)
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(() => {
          const img = new Image();
          img.onload = () => {
            sectors[s] = img;
            render();
            loadingCount--;
            if (loadingCount <= 0) { showLoading(false); loadJuliaList(); }
          };
          img.onerror = () => {
            loadingCount--;
            if (loadingCount <= 0) { showLoading(false); loadJuliaList(); }
          };
          img.src = `./img/julia/jl_${cx}_${cy}_${s}.png?t=${t}`;
        })
        .catch(() => {
          loadingCount--;
          if (loadingCount <= 0) { showLoading(false); loadJuliaList(); }
        });
    }
  }

  function loadJuliaFromList(x, y) {
    document.getElementById('input-cx').value = x;
    document.getElementById('input-cy').value = y;
    currentC = { x, y };
    document.getElementById('hcx').textContent = x;
    document.getElementById('hcy').textContent = y;
    view = { cx: 0, cy: 0, dst: 4 };
    sectors = new Array(TOTAL_S).fill(null);
    render();

    loadingCount = TOTAL_S;
    showLoading(true);
    const t = Date.now();

    for (let s = 0; s < TOTAL_S; s++) {
      const img = new Image();
      img.onload = () => {
        sectors[s] = img;
        render();
        loadingCount--;
        if (loadingCount <= 0) { showLoading(false); highlightActive(x, y); }
      };
      img.onerror = () => {
        loadingCount--;
        if (loadingCount <= 0) { showLoading(false); }
      };
      img.src = `./img/julia/jl_${x}_${y}_${s}.png?t=${t}`;
    }
  }

  function highlightActive(x, y) {
    document.querySelectorAll('.julia-item').forEach(el => {
      el.classList.toggle('active', el.dataset.x == x && el.dataset.y == y);
    });
  }

  async function loadJuliaList() {
    const listEl = document.getElementById('julia-list');
    try {
      const r = await fetch(`${API}/julias`);
      if (!r.ok) throw new Error();
      const data = await r.json();
      const julias = data.julias || [];

      if (julias.length === 0) {
        listEl.innerHTML = '<span id="no-julias">no sets generated yet</span>';
        return;
      }

      listEl.innerHTML = '';
      julias.forEach(({ x, y }) => {
        const item = document.createElement('div');
        item.className = 'julia-item';
        item.dataset.x = x;
        item.dataset.y = y;
        item.innerHTML = `<span class="coords">c = ${x} + ${y}i</span>`;
        item.onclick = () => loadJuliaFromList(x, y);
        listEl.appendChild(item);
      });

      if (currentC) highlightActive(currentC.x, currentC.y);
    } catch {
      listEl.innerHTML = '<span id="no-julias">error loading list</span>';
    }
  }

  // Zoom
  document.getElementById('canvas-container').addEventListener('wheel', (e) => {
    e.preventDefault();
    if (!hasSectors()) return;
    const factor = e.deltaY > 0 ? 1.3 : 0.77;
    const newDst = view.dst * factor;
    if (newDst > DST_MAX) return;

    const rect  = canvas.getBoundingClientRect();
    const scale = Math.min(canvas.width, canvas.height) / view.dst;
    const mathX = view.cx + (e.clientX - rect.left  - canvas.width  / 2) / scale;
    const mathY = view.cy - (e.clientY - rect.top   - canvas.height / 2) / scale;
    view.cx  = mathX + (view.cx - mathX) * factor;
    view.cy  = mathY + (view.cy - mathY) * factor;
    view.dst = newDst;
    render();
  }, { passive: false });

  // Pan
  let drag = null;
  const cont = document.getElementById('canvas-container');
  cont.addEventListener('mousedown', (e) => {
    drag = { startX: e.clientX, startY: e.clientY, cx: view.cx, cy: view.cy };
  });
  cont.addEventListener('mousemove', (e) => {
    if (!drag) return;
    const scale = Math.min(canvas.width, canvas.height) / view.dst;
    view.cx = drag.cx - (e.clientX - drag.startX) / scale;
    view.cy = drag.cy + (e.clientY - drag.startY) / scale;
    render();
  });
  cont.addEventListener('mouseup',    () => { drag = null; });
  cont.addEventListener('mouseleave', () => { drag = null; });

  function resetView() {
    view = { cx: 0, cy: 0, dst: 4 };
    render();
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  loadJuliaList();
</script>
</body>
</html>
